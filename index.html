<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Кнопка переключения темы -->
      <button id="themeToggle" class="theme-toggle" title="Переключить тему">🌙</button>

      <h1>Мой список задач</h1>

      <!-- Форма для добавления задачи -->
      <div class="input-area">
        <input
          type="text"
          id="taskInput"
          placeholder="Введите задачу..."
        />
        <button id="addBtn">Добавить</button>
      </div>

      <!-- Кнопки фильтра -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">Активные</button>
        <button class="filter-btn" data-filter="done">Выполненные</button>
      </div>

      <!-- Список задач -->
      <ul id="taskList"></ul>

      <!-- Счётчик задач -->
      <p id="counter" class="counter"></p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
