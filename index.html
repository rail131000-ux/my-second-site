<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <button id="themeToggle" class="theme-toggle" title="Переключить тему">🌙</button>

      <h1>Мой список задач</h1>

      <div class="input-area">

        <!-- Три таба приоритета -->
        <div class="priority-tabs">
          <button class="priority-tab active" data-priority="low">🟢 Низкий</button>
          <button class="priority-tab" data-priority="medium">🟡 Средний</button>
          <button class="priority-tab" data-priority="high">🔴 Высокий</button>
        </div>

        <!-- Обёртка: textarea + счётчик внутри -->
        <div class="textarea-wrapper">
          <textarea
            id="taskInput"
            class="task-textarea"
            placeholder="Введите задачу..."
            maxlength="100"
            rows="3"
          ></textarea>
          <span id="charCounter" class="char-counter">0 / 100</span>
        </div>

        <!-- Кнопка на всю ширину -->
        <button id="addBtn" class="add-btn">Добавить</button>

      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">Активные</button>
        <button class="filter-btn" data-filter="done">Выполненные</button>
      </div>

      <ul id="taskList"></ul>

      <div class="bottom-panel">
        <p id="counter" class="counter"></p>
        <button id="clearDoneBtn" class="clear-done-btn" style="display:none">Очистить выполненные</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
