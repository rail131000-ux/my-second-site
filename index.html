<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <button id="themeToggle" class="theme-toggle" title="Переключить тему">🌙</button>

      <h1>Мой список задач</h1>

      <div class="input-area">
        <div class="input-wrapper">
          <div class="input-top-row">
            <select id="prioritySelect" class="priority-select" title="Приоритет задачи">
              <option value="low">🟢 Низкий</option>
              <option value="medium" selected>🟡 Средний</option>
              <option value="high">🔴 Высокий</option>
            </select>
          </div>
          <textarea
            id="taskInput"
            class="task-textarea"
            placeholder="Введите задачу..."
            maxlength="100"
            rows="1"
          ></textarea>
          <span id="charCounter" class="char-counter">0 / 100</span>
        </div>
        <button id="addBtn">Добавить</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">Активные</button>
        <button class="filter-btn" data-filter="done">Выполненные</button>
      </div>

      <ul id="taskList"></ul>

      <div class="bottom-panel">
        <p id="counter" class="counter"></p>
        <button id="clearDoneBtn" class="clear-done-btn" style="display:none">Очистить выполненные</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
